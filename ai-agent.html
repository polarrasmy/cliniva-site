<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliniva — مساعد المكالمات الذكي (ديمو)</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1417;--surface:#10211f;--surface2:#15292e;--surface3:#1c3a36;
  --accent:#2BA89B;--accent2:#0F5F56;--accent-dim:rgba(19,168,164,.14);
  --text:#eaf4f3;--text-muted:#8aa3a1;--text-dim:#4a5f5d;--border:rgba(255,255,255,.08);
  --green:#1d9e75;--green-dim:rgba(29,158,117,.16);--green-text:#5ecfa0;--radius:16px;--rs:10px;--font:"Tajawal",system-ui,Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:radial-gradient(900px 500px at 80% -10%,#11302d 0,transparent 60%),var(--bg);color:var(--text);font-family:var(--font);font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.app{width:100%;max-width:520px;display:flex;flex-direction:column;height:min(720px,92vh)}
.header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:16px 18px;display:flex;align-items:center;gap:13px}
.avatar{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#06201f;position:relative}
.status-dot{position:absolute;bottom:-1px;left:-1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--surface);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header-info{flex:1}.agent-name{font-size:16px;font-weight:800}.agent-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}
.call-badge{font-size:10px;padding:4px 11px;border-radius:20px;background:var(--green-dim);color:var(--green-text);font-weight:700}
.scenarios{background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:6px;overflow-x:auto}
.scenarios::-webkit-scrollbar{display:none}
.sc-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-family:var(--font);font-size:13px;font-weight:700;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:.18s}
.sc-btn:hover{border-color:var(--accent);color:var(--text);background:var(--surface3)}
.messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:9px;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.messages::-webkit-scrollbar{width:3px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:10px;max-width:90%;animation:fadeUp 250ms ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.ai{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.ai .msg-avatar{background:var(--accent-dim);border:1px solid rgba(19,168,164,.25);color:var(--accent)}
.msg.user .msg-avatar{background:var(--surface2);border:1px solid var(--border)}
.bubble{padding:10px 14px;border-radius:var(--rs);font-size:13.5px;line-height:1.75}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px var(--rs) var(--rs) var(--rs)}
.msg.user .bubble{background:var(--accent-dim);border:1px solid rgba(19,168,164,.18);border-radius:var(--rs) 4px var(--rs) var(--rs)}
.okbox{align-self:stretch;background:var(--green-dim);border:1px solid rgba(94,207,160,.3);color:var(--green-text);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;white-space:pre-line}
.typing{display:flex;gap:10px;align-self:flex-start}
.typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px var(--rs) var(--rs) var(--rs);padding:13px 16px;display:flex;gap:5px}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.chip{background:var(--surface2);border:1.5px solid rgba(19,168,164,.35);color:var(--accent);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.chip:hover{background:var(--surface3)}
.input-area{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;display:flex;gap:9px;align-items:flex-end}
textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--font);font-size:13.5px;padding:11px 14px;resize:none;min-height:44px;max-height:100px;line-height:1.5;outline:none}
textarea::placeholder{color:var(--text-dim)}textarea:focus{border-color:rgba(19,168,164,.45)}
.send-btn,.reset-btn{width:44px;height:44px;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.18s}
.send-btn{background:var(--accent);border:none;color:#06201f}.send-btn:hover{background:#15bdb8}
.reset-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-size:16px}
.send-btn svg{width:17px;height:17px}
.foot{text-align:center;font-size:10.5px;color:var(--text-dim);margin-top:12px;line-height:1.8}
.foot a{color:var(--accent)}
.flag{display:inline-block;background:rgba(201,125,46,.14);color:#e0a05a;border:1px solid rgba(201,125,46,.3);font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="avatar">Cv<div class="status-dot"></div></div>
    <div class="header-info"><div class="agent-name">مساعد Cliniva الذكي</div><div class="agent-sub">مركز الاتصال AI · عيادة الأسنان · يرد ويحجز فعلًا 24/7</div></div>
    <div class="call-badge">● متصل</div>
  </div>
  <div class="scenarios">
    <button class="sc-btn" onclick="handle('عايز أحجز موعد')">📅 حجز موعد</button>
    <button class="sc-btn" onclick="handle('كام الأسعار؟')">💰 الأسعار</button>
    <button class="sc-btn" onclick="handle('بتفتحوا إمتى؟')">🕐 المواعيد</button>
    <button class="sc-btn" onclick="handle('عندي ألم شديد')">🚨 طوارئ</button>
    <button class="sc-btn" onclick="handle('عايز ابتسامة هوليوود')">✨ تجميل</button>
    <button class="sc-btn" onclick="handle('عايز ألغي موعدي')">🔄 إلغاء</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chips" id="chips"></div>
  <div class="input-area">
    <button class="reset-btn" onclick="resetChat()" title="مكالمة جديدة">↺</button>
    <textarea id="input" placeholder="اكتب رسالتك..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button class="send-btn" onclick="send()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
  </div>
</div>
<p class="foot"><span class="flag">ديمو</span> مساعد Cliniva بيحاور ويحجز فعلًا — والحجز <b style="color:var(--accent)">بيظهر في الداشبورد فورًا</b> · <a href="./app.html">‹ الداشبورد</a></p>

<script>
"use strict";
var SERVICES=["كشف","تنظيف","تقويم","زراعة","تجميل"];
var DAYS=["النهاردة","بكرة","بعد بكرة","الأحد","السبت"];
var TIMES=["10:00 ص","12:00 م","4:00 م","7:00 م"];
function takenTimes(day){var tk={};try{(JSON.parse(localStorage.getItem("cliniva_bookings")||"[]")).forEach(function(b){if(b&&b.day===day&&b.time)tk[b.time]=1;});}catch(e){}return tk;}
function freeTimes(day){var tk=takenTimes(day);return TIMES.filter(function(t){return !tk[t];});}
var PRICE={"كشف":"150 درهم","تنظيف":"من 400 درهم","تقويم":"من 9,000 درهم","زراعة":"من 6,500 درهم","تجميل":"من 1,200 درهم"};
var msgs=document.getElementById("messages"), chipsEl=document.getElementById("chips"), inp=document.getElementById("input");
var step="idle", bk={}, busy=false;

function addMsg(role,text){var m=document.createElement("div");m.className="msg "+role;
  var a=document.createElement("div");a.className="msg-avatar";a.textContent=role==="ai"?"Cv":"👤";
  var b=document.createElement("div");b.className="bubble";
  String(text).split("\n").forEach(function(l,i){if(i>0)b.appendChild(document.createElement("br"));b.appendChild(document.createTextNode(l));});
  m.appendChild(a);m.appendChild(b);msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;}
function okBox(t){var d=document.createElement("div");d.className="okbox";d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function setChips(opts){while(chipsEl.firstChild)chipsEl.removeChild(chipsEl.firstChild);
  (opts||[]).forEach(function(o){var c=document.createElement("button");c.className="chip";c.textContent=o;c.onclick=function(){handle(o);};chipsEl.appendChild(c);});}
function botSay(text,opts){busy=true;setChips([]);var w=document.createElement("div");w.className="typing";w.id="tp";
  var a=document.createElement("div");a.className="msg-avatar";a.style.cssText="background:var(--accent-dim);color:var(--accent)";a.textContent="Cv";
  var bub=document.createElement("div");bub.className="typing-bubble";for(var i=0;i<3;i++){var d=document.createElement("div");d.className="tdot";bub.appendChild(d);}
  w.appendChild(a);w.appendChild(bub);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
  setTimeout(function(){var t=document.getElementById("tp");if(t)t.remove();addMsg("ai",text);setChips(opts||[]);busy=false;},700);}
function has(t,arr){for(var i=0;i<arr.length;i++)if(t.indexOf(arr[i])>-1)return arr[i];return null;}
function genId(){var s="";for(var i=0;i<4;i++)s+=Math.floor(Math.random()*10);return "CLV-"+s;}
function saveBooking(b){var k="cliniva_bookings",a=[];try{a=JSON.parse(localStorage.getItem(k)||"[]");}catch(e){}a.push(b);
  try{localStorage.setItem(k,JSON.stringify(a));}catch(e){}try{window.dispatchEvent(new Event("cliniva-booked"));}catch(e){}}

function handle(raw){
  var t=(raw||"").trim();if(!t||busy)return;addMsg("user",t);var low=t.toLowerCase();
  // ----- in-flow steps (so it actually books) -----
  if(step==="service"){var s=has(t,SERVICES)||t;bk.service=s;step="day";return botSay("تمام، "+s+" ✨ أنهي يوم يناسبك؟",DAYS);}
  if(step==="day"){bk.day=has(t,DAYS)||t;var fr=freeTimes(bk.day);if(!fr.length){step="day";return botSay("معلش، كل المواعيد محجوزة يوم "+bk.day+" 🙏 جرّب يوم تاني؟",DAYS);}step="time";return botSay("وأنهي وقت؟ (المتاح بس)",fr);}
  if(step==="time"){var tkn=takenTimes(bk.day);if(tkn[t]){var fr2=freeTimes(bk.day);return botSay("للأسف "+t+" اتحجز خلاص — السيستم بيمنع الحجز المزدوج ✋ اختار من المتاح:",fr2.length?fr2:DAYS);}bk.time=t;step="name";return botSay("آخر حاجة — اسمك الكريم؟");}
  if(step==="name"){bk.name=t;step="done";bk.id=genId();bk.via="مساعد AI";saveBooking(bk);
    return botSay("تمام يا "+bk.name+"! بأكّد الحجز...",[]),setTimeout(function(){
      okBox("✅ تم الحجز\nرقم: "+bk.id+"\n"+bk.service+" — "+bk.day+" "+bk.time+"\nباسم: "+bk.name);
      addMsg("ai","📲 اتبعت رسالة تأكيد واتساب + تذكير قبل الموعد بـ24 ساعة. في انتظارك يا "+bk.name+"! 🦷");
      setChips(["حجز تاني","شكرًا"]);},950);}
  // ----- intents -----
  if(has(low,["حجز","موعد","احجز","أحجز","حجز تاني","ميعاد"])){step="service";bk={};return botSay("يسعدني أحجزلك 🦷 أنهي خدمة؟",SERVICES);}
  if(has(low,["تجميل","تبييض","عدسات","هوليوود","ابتسامة","فينير"])){step="day";bk={service:"تجميل"};return botSay("تجميل الأسنان من أكتر خدماتنا 😍 أنهي يوم يناسبك؟",DAYS);}
  if(has(low,["طوارئ","ألم","الم","وجع","مستعجل","ضرس"])){step="day";bk={service:"طوارئ"};return botSay("سلامتك 🙏 هرتّبلك أقرب موعد طوارئ وأحوّلك للدكتور. أنهي يوم؟ (لو النهاردة أحسن)",DAYS);}
  if(has(low,["سعر","كام","تكلفة","اسعار","أسعار","بكام","فلوس"])){var ls="";for(var k in PRICE)ls+="• "+k+": "+PRICE[k]+"\n";step="idle";return botSay("الأسعار التقريبية:\n"+ls+"الدكتور بيحدد النهائي بعد الكشف. تحب أحجزلك؟",["أحجز موعد"]);}
  if(has(low,["مواعيد","ساعات","بتفتح","امتى","إمتى","الجمعة","بتقفل","فاتح"])){step="idle";return botSay("مواعيد العمل: السبت–الخميس 10ص–9م، والجمعة من 2 ظهرًا. تحب أحجزلك في أقرب وقت؟",["أحجز موعد"]);}
  if(has(low,["الغاء","إلغاء","ألغي","الغي","كنسل","أجّل","اجل","تأجيل"])){step="idle";return botSay("تمام، مفيش مشكلة 🌷 تحب ألغي ولا أأجّل لميعاد تاني؟",["أأجّل الموعد","ألغي خالص"]);}
  if(has(low,["شكر","تسلم","ميرسي","تمام كده"])){step="idle";return botSay("العفو 🌟 أنا في خدمتك 24/7 — تحب حاجة تانية؟",["أحجز موعد","الأسعار"]);}
  if(has(low,["اكيد","أكيد","ايوه","أيوه","نعم","ماشي","اوك","ok","تمام"])){step="service";bk={};return botSay("تمام! أنهي خدمة تحب تحجزها؟",SERVICES);}
  step="idle";
  return botSay("أنا أساعدك في: حجز موعد، الأسعار، المواعيد، أو طوارئ. تحب تبدأ بإيه؟",["أحجز موعد","الأسعار","المواعيد"]);
}
function send(){var v=inp.value;inp.value="";inp.style.height="";handle(v);}
function resetChat(){while(msgs.firstChild)msgs.removeChild(msgs.firstChild);step="idle";bk={};greet();}
function greet(){botSay("أهلاً! أنا مساعد Cliniva الذكي لعيادة الأسنان 🦷\nأقدر أحجزلك موعد في ثواني أو أجاوب استفسارك. تحب نبدأ بإيه؟",["أحجز موعد","الأسعار","المواعيد"]);}
inp.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px";});
window.addEventListener("load",function(){setTimeout(greet,400);});
</script>
</body>
</html>
