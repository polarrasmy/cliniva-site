<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliniva — مساعد المكالمات الذكي (ديمو)</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1417;--surface:#10211f;--surface2:#15292650;--surface3:#1c3a36;
  --accent:#13A8A4;--accent2:#0E7C7B;--accent-dim:rgba(19,168,164,.14);
  --text:#eaf4f3;--text-muted:#8aa3a1;--text-dim:#4a5f5d;--border:rgba(255,255,255,.07);
  --border-hover:rgba(255,255,255,.14);--green:#1d9e75;--green-dim:rgba(29,158,117,.14);--green-text:#5ecfa0;
  --red:#e24b4a;--radius:16px;--radius-sm:10px;--transition:200ms ease;
  --font:"Tajawal",system-ui,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(900px 500px at 80% -10%,#11302d 0,transparent 60%),var(--bg);color:var(--text);
  font-family:var(--font);font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.app{width:100%;max-width:520px;display:flex;flex-direction:column;height:min(720px,92vh)}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:16px 18px;display:flex;align-items:center;gap:13px;flex-shrink:0}
.avatar{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#06201f;flex-shrink:0;position:relative}
.status-dot{position:absolute;bottom:-1px;left:-1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--surface);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header-info{flex:1}
.agent-name{font-size:16px;font-weight:800}
.agent-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}
.header-tools{display:flex;align-items:center;gap:7px;flex-shrink:0}
.call-badge{font-size:10px;padding:4px 11px;border-radius:20px;background:var(--green-dim);color:var(--green-text);border:1px solid rgba(94,207,160,.15);font-weight:700}
.scenarios{background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.scenarios::-webkit-scrollbar{display:none}
.sc-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-family:var(--font);font-size:13px;font-weight:700;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:all var(--transition);flex-shrink:0}
.sc-btn:hover{border-color:var(--accent);color:var(--text);background:var(--surface3)}
.messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.messages::-webkit-scrollbar{width:3px}.messages::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px}
.msg{display:flex;gap:10px;max-width:90%;animation:fadeUp 250ms ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:2px}
.msg.ai .msg-avatar{background:var(--accent-dim);border:1px solid rgba(19,168,164,.25);color:var(--accent)}
.msg.user .msg-avatar{background:var(--surface2);border:1px solid var(--border)}
.bubble{padding:10px 14px;border-radius:var(--radius-sm);font-size:13.5px;line-height:1.75}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px var(--radius-sm) var(--radius-sm) var(--radius-sm)}
.msg.user .bubble{background:var(--accent-dim);border:1px solid rgba(19,168,164,.18);border-radius:var(--radius-sm) 4px var(--radius-sm) var(--radius-sm)}
.typing{display:flex;gap:10px;align-self:flex-start;animation:fadeUp 200ms ease both}
.typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px var(--radius-sm) var(--radius-sm) var(--radius-sm);padding:13px 16px;display:flex;gap:5px;align-items:center}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.sys-msg{text-align:center;font-size:10.5px;color:var(--text-dim);letter-spacing:.05em;padding:4px 0}
.input-area{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;display:flex;gap:9px;align-items:flex-end;flex-shrink:0}
textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13.5px;padding:11px 14px;resize:none;min-height:44px;max-height:100px;line-height:1.5;outline:none;transition:border-color var(--transition)}
textarea::placeholder{color:var(--text-dim)}textarea:focus{border-color:rgba(19,168,164,.45)}
.send-btn,.reset-btn{width:44px;height:44px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.send-btn{background:var(--accent);border:none;color:#06201f}
.send-btn:hover{background:#15bdb8;transform:scale(1.04)}.send-btn:disabled{background:var(--surface3);cursor:not-allowed;transform:none}
.send-btn svg{width:17px;height:17px}
.reset-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-size:16px}
.reset-btn:hover{border-color:var(--border-hover);color:var(--text)}
.foot{text-align:center;font-size:10.5px;color:var(--text-dim);margin-top:12px;line-height:1.8}
.foot a{color:var(--accent)}
.flag{display:inline-block;background:rgba(201,125,46,.14);color:#e0a05a;border:1px solid rgba(201,125,46,.3);font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
</style>
</head>
<body>
<div class="app reveal">
  <div class="header">
    <div class="avatar">Cv<div class="status-dot"></div></div>
    <div class="header-info">
      <div class="agent-name" data-en="Cliniva AI Assistant">مساعد Cliniva الذكي</div>
      <div class="agent-sub" data-en="AI Call Center · Dental Clinic · Answers 24/7">مركز الاتصال AI · عيادة الأسنان · يرد 24/7</div>
    </div>
    <div class="header-tools">
      <select id="cur" onchange="applyCur(this.value)" title="العملة" style="border:1px solid #E2EAEA;border-radius:9px;padding:8px 10px;font-weight:800;font-size:13px">
        <option value="AED">د.إ AED</option>
        <option value="SAR">﷼ SAR</option>
        <option value="USD">$ USD</option>
        <option value="QAR">ر.ق QAR</option>
        <option value="KWD">د.ك KWD</option>
        <option value="BHD">د.ب BHD</option>
        <option value="EGP">ج.م EGP</option>
      </select>
      <button id="lng" onclick="toggleLang()" style="border:1px solid #E2EAEA;border-radius:9px;background:#fff;font-weight:800;font-size:13px;cursor:pointer;padding:8px 10px">EN</button>
    </div>
  </div>

  <div class="scenarios">
    <button class="sc-btn" onclick="quickSend('عايز أحجز موعد')" data-en="📅 Book appointment">📅 حجز موعد</button>
    <button class="sc-btn" onclick="quickSend('كام سعر الكشف عندكم؟')" data-en="💰 Prices">💰 الأسعار</button>
    <button class="sc-btn" onclick="quickSend('عندي ألم شديد في ضرسي')" data-en="🚨 Emergency">🚨 طوارئ</button>
    <button class="sc-btn" onclick="quickSend('عايز ألغي موعدي')" data-en="🔄 Cancel">🔄 إلغاء</button>
    <button class="sc-btn" onclick="quickSend('إنتو بتفتحوا إمتى؟')" data-en="🕐 Hours">🕐 المواعيد</button>
    <button class="sc-btn" onclick="quickSend('عايز أعمل ابتسامة هوليوود')" data-en="✨ Cosmetic">✨ تجميل</button>
  </div>

  <div class="messages" id="messages"><div class="sys-msg" data-en="— Call started —">— بداية المكالمة —</div></div>

  <div class="input-area">
    <button class="reset-btn" onclick="resetChat()" title="مكالمة جديدة">↺</button>
    <textarea id="input" placeholder="اكتب رسالتك..." data-en-ph="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>
<p class="foot"><span class="flag" data-en="DEMO">ديمو</span> <span data-en="A simulation of the Cliniva assistant — illustrative replies · the live version actually answers calls and WhatsApp during onboarding">محاكاة لمساعد Cliniva — ردود توضيحية · النسخة الحية بتترد على المكالمات والواتساب فعليًا في الـ onboarding</span> · <a href="./app.html" data-en="‹ Dashboard">‹ الداشبورد</a></p>

<script>
"use strict";

// ---------- bilingual ----------
let LANG='ar';
function toggleLang(){ applyLang(LANG==='ar'?'en':'ar'); }
function applyLang(l){ LANG=l; var en=(l==='en');
  document.documentElement.lang=l; document.documentElement.dir=en?'ltr':'rtl';
  var b=document.getElementById('lng'); if(b) b.textContent=en?'ع':'EN';
  document.querySelectorAll('[data-en]').forEach(function(el){ if(!el.dataset._ar) el.dataset._ar=el.textContent; el.textContent = en?el.getAttribute('data-en'):el.dataset._ar; });
  document.querySelectorAll('[data-en-ph]').forEach(function(el){ if(!el.dataset._arPh) el.dataset._arPh=el.getAttribute('placeholder')||''; el.setAttribute('placeholder', en?el.getAttribute('data-en-ph'):el.dataset._arPh); });
  var ta=document.getElementById('input'); if(ta) ta.style.direction = en?'ltr':'rtl';
}

// ---------- currency ----------
var RATE={SAR:1,AED:0.979,USD:0.2667,QAR:0.971,KWD:0.0819,BHD:0.1003,EGP:13.07};
var SYM={SAR:'﷼',AED:'د.إ',USD:'$',QAR:'ر.ق',KWD:'د.ك',BHD:'د.ب',EGP:'ج.م'};
var CUR='AED';
function fmtPrice(baseSar,plus){
  var r=RATE[CUR]||1, s=SYM[CUR]||'';
  var v=baseSar*r;
  v = v>=1000 ? Math.round(v/100)*100 : Math.round(v/5)*5;
  return s+' '+(plus?'+':'~')+v.toLocaleString('en-US');
}
function applyCur(c){ CUR=c; }

// ---------- safe DOM (no innerHTML) ----------
function addMessage(role, text){
  var msgs=document.getElementById('messages');
  var wrap=document.createElement('div'); wrap.className='msg '+role;
  var av=document.createElement('div'); av.className='msg-avatar'; av.textContent = role==='ai' ? 'Cv' : '👤';
  var b=document.createElement('div'); b.className='bubble';
  String(text).split('\n').forEach(function(line,i){ if(i>0)b.appendChild(document.createElement('br')); b.appendChild(document.createTextNode(line)); });
  wrap.appendChild(av); wrap.appendChild(b); msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  var msgs=document.getElementById('messages');
  var w=document.createElement('div'); w.className='typing'; w.id='typing-indicator';
  var av=document.createElement('div'); av.className='msg-avatar'; av.style.cssText='background:var(--accent-dim);border:1px solid rgba(19,168,164,.25);color:var(--accent)'; av.textContent='Cv';
  var bub=document.createElement('div'); bub.className='typing-bubble';
  for(var i=0;i<3;i++){ var d=document.createElement('div'); d.className='tdot'; bub.appendChild(d); }
  w.appendChild(av); w.appendChild(bub); msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){ var e=document.getElementById('typing-indicator'); if(e)e.remove(); }

// ---------- scripted intelligent responses (Cliniva — dental, Gulf) ----------
// Prices are stored as SAR base values and rendered currency-aware.
// AED→SAR base = AED / 0.979  (150→153.2 ; 400→408.6 ; 1200→1225.7 ; 9000→9193)
function reply(t){
  t=(t||'').toLowerCase();
  var en=(LANG==='en');
  if(/حجز|موعد|احجز|أحجز|اعمل ميعاد|book|appointment|schedule/.test(t))
    return en
      ? 'Of course, I\'d be happy to book that for you ✨ Which day and time works best? We have slots available tomorrow morning and evening. As soon as we confirm, you\'ll get an instant confirmation on WhatsApp plus a reminder 24 hours before your appointment.'
      : 'أكيد، يسعدني أحجزلك ✨ تحب أنهي يوم ووقت؟ عندنا مواعيد متاحة بكرة الصبح والمسا. أول ما نأكد، هتوصلك رسالة تأكيد على واتساب فورًا + تذكير قبل الموعد بـ24 ساعة.';
  if(/سعر|كام|تكلفة|بكام|أسعار|اسعار|فلوس|price|cost|how much|fee/.test(t))
    return en
      ? 'Approximate prices at Cliniva:\n• Check-up: '+fmtPrice(153.2,false)+'\n• Cleaning & polishing: from '+fmtPrice(408.6,true)+'\n• Laser whitening: from '+fmtPrice(1225.7,true)+'\n• Clear aligners: from '+fmtPrice(9193,true)+'\nThe final price is set by the doctor after the examination, based on your case.'
      : 'الأسعار التقريبية في Cliniva:\n• الكشف: '+fmtPrice(153.2,false)+'\n• تنظيف وتلميع: من '+fmtPrice(408.6,true)+'\n• تبييض بالليزر: من '+fmtPrice(1225.7,true)+'\n• تقويم شفاف: من '+fmtPrice(9193,true)+'\nالسعر النهائي بيحدده الدكتور بعد الكشف حسب حالتك.';
  if(/ألم|الم|وجع|طوار|مستعجل|ضرسي|سنّ|ورم|pain|emergency|urgent|tooth|swelling/.test(t))
    return en
      ? 'Your wellbeing comes first 🙏 If the pain is severe, I\'ll arrange the earliest emergency slot today and connect you directly with the doctor. Can you come in within the hour?'
      : 'سلامتك أهم حاجة 🙏 لو الألم شديد، هرتّبلك أقرب موعد طوارئ النهاردة وأحوّلك للدكتور مباشرة. تقدر تيجي خلال ساعة؟';
  if(/الغاء|إلغاء|ألغي|الغي|كنسل|أجّل|تأجيل|اجل|cancel|reschedule|postpone/.test(t))
    return en
      ? 'No problem at all 🌷 Would you like me to cancel the appointment, or reschedule it to a time that suits you better?'
      : 'تمام، مفيش مشكلة خالص 🌷 تحب ألغي الموعد، ولا أأجّله لميعاد تاني يريحك أكتر؟';
  if(/مواعيد|ساعات|بتفتح|بتشتغل|إمتى|امتى|السبت|الجمعة|بتقفل|hours|open|close|when|saturday|friday/.test(t))
    return en
      ? 'Working hours: Saturday–Thursday from 10 AM to 9 PM, and Friday from 2 PM. Would you like me to book you the earliest available slot?'
      : 'مواعيد العمل: السبت–الخميس من 10 صباحًا لـ 9 مساءً، والجمعة من 2 ظهرًا. تحب أحجزلك في أقرب وقت متاح؟';
  if(/تجميل|تبييض|عدسات|فينير|ابتسامة|هوليوود|تقويم|زراعة|cosmetic|whitening|veneer|smile|hollywood|aligner|implant/.test(t))
    return en
      ? 'Cosmetic dentistry is one of our most requested services — veneers, laser whitening, and Digital Smile Design (DSD) with a specialist. Would you like me to book a cosmetic consultation for you?'
      : 'تجميل الأسنان من أكتر خدماتنا طلبًا — عدسات (فينير)، تبييض بالليزر، وتصميم ابتسامة (DSD) مع استشاري. تحب أحجزلك استشارة تجميلية؟';
  if(/شكرا|شكرًا|تمام|تسلم|ميرسي|thank|thanks|great/.test(t))
    return en
      ? 'You\'re most welcome 🌟 I\'m here for you 24/7. If you need anything else, just let me know — we look forward to seeing you at Cliniva.'
      : 'العفو 🌟 أنا هنا في خدمتك 24/7. لو احتجت أي حاجة تانية قوللي، وفي انتظارك في Cliniva.';
  return en
    ? 'I\'m here to help with anything related to the clinic — booking an appointment, prices, working hours, or an emergency. Could you tell me a bit more about what you need?'
    : 'أنا هنا أساعدك في كل اللي يخص العيادة — حجز موعد، أسعار، مواعيد العمل، أو حالة طوارئ. ممكن توضّح طلبك أكتر؟';
}

var busy=false;
function sendMessage(text){
  var input=document.getElementById('input');
  var userText=text||input.value.trim();
  if(!userText||busy) return;
  input.value=''; input.style.height='';
  addMessage('user',userText);
  busy=true; document.getElementById('send-btn').disabled=true;
  showTyping();
  setTimeout(function(){
    hideTyping(); addMessage('ai', reply(userText));
    busy=false; document.getElementById('send-btn').disabled=false;
  }, 1100 + Math.min(userText.length*20, 900));
}
function quickSend(t){ sendMessage(t); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function resetChat(){
  var msgs=document.getElementById('messages');
  while(msgs.firstChild) msgs.removeChild(msgs.firstChild);
  var s=document.createElement('div'); s.className='sys-msg';
  s.setAttribute('data-en','— New call —');
  if(LANG==='en'){ s.dataset._ar='— مكالمة جديدة —'; s.textContent='— New call —'; }
  else { s.textContent='— مكالمة جديدة —'; }
  msgs.appendChild(s);
}
window.addEventListener('load', function(){
  // reveal animation — chat container only
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.reveal:not(.in)').forEach(function(el){io.observe(el);});

  setTimeout(function(){ showTyping();
    setTimeout(function(){ hideTyping();
      addMessage('ai', LANG==='en'
        ? 'Welcome! This is the Cliniva AI assistant for the dental clinic 🦷\nHow can I help you today — book an appointment, a question, or an emergency?'
        : 'أهلاً وسهلاً! معاك مساعد Cliniva الذكي لعيادة الأسنان 🦷\nأقدر أساعدك في إيه النهاردة — حجز موعد، استفسار، أو طوارئ؟');
    }, 1400);
  }, 500);
});
</script>
</body>
</html>
